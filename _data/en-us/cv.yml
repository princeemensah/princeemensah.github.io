- title: Projects
  type: time_table
  contents:
    - title: Dark-soliton Quantum Bit From the Coherent Dynamics of Bose-Einstein condensates with self-defocusing non-linearity (MS Thesis).
      year: 2023
      description: 
        - Studied how Bose‑Einstein condensates (BECs) with self‑defocusing effects can create quantum bits using dark solitons in a dilute gas.
        - Developed a mathematical model for BECs and examined the quantum states they produce.
        - This research helps explore new ways to encode and control quantum information with BECs.

    - title: Predicting the severity of road traffic accicents in Ghana using machine learnig algorithms (BS Thesis).
      year: 2021
      description: 
        - Used machine learning models such as Random Forest, Logistic Regression, and Neural Networks to predict crash injury severity.
        - Compared their performance based on accuracy and other metrics, and used feature selection to find important factors.

    - title: Updates on Meningitis Surveillance in the Upper West region of Ghana (2012‑2020)
      year: 2021
      description: 
        - Analyzed Meningitis data from the Upper West region in Ghana, focusing on cases from 2012 to 2020.
        - Using QGIS software, we studied the spread of cases and deaths across the 11 districts in the region

    - title: Cassava Leaf Disease Classification (1st Place) <a href="https://www.kaggle.com/competitions/ammi-2024-computer-vision/leaderboard">Kaggle Link</a> | <a href="https://app-cld-predict-21-cassavage.streamlit.app/">Web App</a> 
      year: 2023
      description: 
        - Utilised the ResNet50 model for cassava leaf disease classification
        - Built a web app using the model to classify cassava leaf images into one of several categories to help identify common diseases.

